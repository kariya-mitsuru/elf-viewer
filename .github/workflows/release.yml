name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    name: Build (Linux ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Verify version matches tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CURRENT=$(cd frontend && node -p "require('./package.json').version")
          if [ "$VERSION" != "$CURRENT" ]; then
            echo "::error::Tag v$VERSION does not match package.json $CURRENT"
            exit 1
          fi

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -tags webkit2_41

      - name: Rename binary
        run: mv build/bin/elf-viewer build/bin/elf-viewer-${GITHUB_REF_NAME}-linux-${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: elf-viewer-linux-${{ matrix.arch }}
          path: build/bin/elf-viewer-${{ github.ref_name }}-linux-${{ matrix.arch }}

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build
        run: cd frontend && npm ci && npm run build

      - name: Rename for release
        run: cp frontend/dist/index.html elf-viewer-${GITHUB_REF_NAME}.html

      - uses: actions/upload-artifact@v4
        with:
          name: elf-viewer-web
          path: elf-viewer-${{ github.ref_name }}.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist/

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: [build-web]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4

  release:
    name: Create Release
    needs: [build, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "ELF Viewer $GITHUB_REF_NAME" \
            --generate-notes \
            dist/elf-viewer-${GITHUB_REF_NAME}-linux-amd64 \
            dist/elf-viewer-${GITHUB_REF_NAME}-linux-arm64 \
            dist/elf-viewer-${GITHUB_REF_NAME}.html
